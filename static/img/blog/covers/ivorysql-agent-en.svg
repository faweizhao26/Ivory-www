<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="50%" stop-color="#0d1538"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7D52F4"/>
      <stop offset="100%" stop-color="#2f74ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Circuit background -->
  <g opacity="0.05" stroke="#7D52F4" stroke-width="1.5" fill="none">
    <circle cx="200" cy="200" r="80"/>
    <circle cx="200" cy="200" r="50"/>
    <circle cx="500" cy="300" r="60"/>
    <circle cx="900" cy="180" r="70"/>
    <line x1="200" y1="120" x2="500" y2="240"/>
    <line x1="500" y1="240" x2="900" y2="110"/>
    <line x1="400" y1="280" x2="500" y2="360"/>
  </g>

  <!-- AI Agent icon -->
  <circle cx="300" cy="250" r="60" fill="#1a1040" stroke="url(#accent)" stroke-width="2"/>
  <text x="300" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#c4b5fd" text-anchor="middle">AGENT</text>
  <text x="300" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#7D52F4" text-anchor="middle">AI + DB</text>

  <!-- Stats boxes -->
  <rect x="550" y="200" width="140" height="80" rx="12" fill="#0f1f4a" stroke="#2f74ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="620" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#60a5fa" text-anchor="middle">21</text>
  <text x="620" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">Tools</text>

  <rect x="720" y="200" width="140" height="80" rx="12" fill="#1a0f02" stroke="#ffa94d" stroke-width="1" stroke-opacity="0.5"/>
  <text x="790" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#fbbf24" text-anchor="middle">7</text>
  <text x="790" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#fcd34d" text-anchor="middle">Agents</text>

  <rect x="890" y="200" width="140" height="80" rx="12" fill="#0a1000" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="960" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#34d399" text-anchor="middle">50+</text>
  <text x="960" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle">Metrics</text>

  <!-- Bottom area -->
  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040810" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="440" width="1200" height="190" fill="url(#btm)"/>
  <text x="600" y="488" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">IvorySQL Agent: AI Meets Database</text>
  <text x="600" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">Intelligent Ops · Smart Diagnosis · NL2SQL · RAG-Powered DBA</text>

  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
