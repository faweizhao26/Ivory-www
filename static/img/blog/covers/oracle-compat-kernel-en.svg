<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7D52F4"/>
      <stop offset="100%" stop-color="#2f74ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Oracle logo area -->
  <rect x="80" y="140" width="200" height="200" rx="20" fill="#1c0808" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="180" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#fca5a5" text-anchor="middle">ORACLE</text>

  <!-- Bridge -->
  <rect x="420" y="200" width="160" height="80" rx="12" fill="#1e1040" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="500" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#c4b5fd" text-anchor="middle">IVORYSQL</text>

  <!-- PostgreSQL logo area -->
  <rect x="720" y="140" width="200" height="200" rx="20" fill="#0a1628" stroke="#2f74ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="820" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#60a5fa" text-anchor="middle">PostgreSQL</text>

  <!-- Arrows -->
  <line x1="285" y1="240" x2="410" y2="240" stroke="#7D52F4" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="585" y1="240" x2="710" y2="240" stroke="#2f74ff" stroke-width="2" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#7D52F4"/></marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2f74ff"/></marker>
  </defs>

  <!-- Bottom area -->
  <defs>
    <linearGradient id="btm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040810" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <rect x="0" y="440" width="1200" height="190" fill="url(#btm)"/>
  <text x="600" y="488" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">Oracle on PostgreSQL? The Kernel Deep Dive</text>
  <text x="600" y="528" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#93c5fd" text-anchor="middle" fill-opacity="0.8">Dual Parser · PL/iSQL · Packages · ROWNUM · Type System</text>

  <text x="600" y="605" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#374151" text-anchor="middle" letter-spacing="2">IVORYSQL.ORG</text>
</svg>
